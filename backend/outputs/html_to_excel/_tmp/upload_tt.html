<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基础表格</title>
    <style>
        table {
            border-collapse: collapse; /\* 合并边框 \*/
            width: 600px;
        }
        td, th {
            border: 1px solid #333;
            padding: 8px 12px; /\* 内边距 \*/
            text-align: center;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <table>
        <!-- 表头 -->
        <thead>
            <tr>
                <th>序号</th>
                <th>姓名</th>
                <th>年龄</th>
                <th>城市</th>
            </tr>
        </thead>
        <!-- 表格内容 -->
        <tbody>
            <tr>
                <td>1</td>
                <td>张三</td>
                <td>22</td>
                <td>杭州</td>
            </tr>
            <tr>
                <td>2</td>
                <td>李四</td>
                <td>25</td>
                <td>上海</td>
            </tr>
            <tr>
                <td>3</td>
                <td>王五</td>
                <td>20</td>
                <td>北京</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
