<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>simple_table</title>
</head>
<body>
<h1>订单主页面</h1>
<table border="1" id="simple_table_1">
  <thead>
    <tr>
      <th>Item</th>
      <th>Quantity</th>
      <th>Unit Price</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><a class="dottedlink" href="/items/1">Widget A</a></td>
      <td>34</td>
      <td>12.50</td>
    </tr>
    <tr>
      <td><a class="dottedlink" href="/items/2">Widget B</a></td>
      <td>5</td>
      <td>99.99</td>
    </tr>
  </tbody>
  <tfoot>
    <tr class="totallingtable">
      <td>总计</td>
      <td>39</td>
      <td>1,799.45</td>
    </tr>
  </tfoot>
</table>
</body>
</html>
